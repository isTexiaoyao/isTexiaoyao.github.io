<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星空下的浪漫</title>
    <style>
        /* 添加图片动画样式 */
        .image-star {
            position: absolute;
            animation: fadeInOut 5s ease-in-out infinite;
            pointer-events: none;
            max-width: 100px;
            max-height: 100px;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .image-star {
                max-width: 60px;
                max-height: 60px;
            }
        }

        body {
            margin: 0;
            height: 100vh;
            background: #000;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 1.5s infinite;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: #fff;
            text-align: center;
            font-family: '宋体', cursive;
        }

        h1 {
            font-size: 2.5em;
            margin: 0 15px;
            text-shadow: 0 0 10px #ff69b4;
            animation: fadeIn 2s ease-in;
        }

        p {
            font-size: 1.2em;
            margin: 15px 0;
            padding: 0 15px;
        }

        .timer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: Arial, sans-serif;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            width: 80%;
            max-width: 300px;
            box-sizing: border-box;
        }

        .timer span {
            display: block;
            font-size: 1em;
            line-height: 1.5;
        }

        .music-control {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 2;
        }

        .image-star {
            position: absolute;
            animation: fadeInOut 5s ease-in-out infinite;
            pointer-events: none;
            max-width: 100px;
            max-height: 100px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }

        @media (min-width: 768px) {
            h1 { font-size: 4em; }
            p { font-size: 1.5em; }
            .timer { top: 20px; left: 20px; }
            .music-control { top: 20px; right: 20px; }
            .image-star { max-width: 150px; max-height: 150px; }
        }
    </style>
</head>
<body>
    <script>
        // 图片闪烁功能
        const imagePaths = [
            'images/heart.png',    // 请确保这些图片真实存在
            'images/star.png',
            'images/sparkle.png'
        ];

        function createImageStars() {
            const starsContainer = document.querySelector('.stars');
            const img = document.createElement('img');
            
            img.className = 'image-star';
            img.src = imagePaths[Math.floor(Math.random() * imagePaths.length)];
            
            // 动态位置和尺寸
            img.style.left = Math.random() * 95 + '%';
            img.style.top = Math.random() * 95 + '%';
            img.style.width = (100 + Math.random() * 150) + 'px';
            
            starsContainer.appendChild(img);
            
            // 自动清理
            setTimeout(() => img.remove(), 5000);
        }

        // 初始化图片动画
        setInterval(createImageStars, 2000);
        createImageStars(); // 立即创建第一个
    </script>

    <div class="stars"></div>
    
    <div class="timer" id="loveTimer">
        <span id="timeCounter"></span>
    </div>

    <div class="content">
        <h1>陆宇萌</h1>
        <p>你是我宇宙中最亮的星<br>
        愿与你共度这浩瀚星河<br>
        爱你，直到最后一颗星辰熄灭</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="周杰伦 - 晴天.mp3" type="audio/mpeg">
    </audio>

    <div class="music-control" onclick="toggleMusic()">♬ 音乐开关</div>

    <script>
        // 防止移动端双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        });

        // 创建星空
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.cssText = `
                    width: ${Math.random() * 3}px;
                    height: ${Math.random() * 3}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation-delay: ${Math.random() * 1.5}s;
                `;
                starsContainer.appendChild(star);
            }
        }

        // 计时器
        function updateTimer() {
            const startDate = new Date(2023, 11, 1);
            const diff = Date.now() - startDate;
            document.getElementById('timeCounter').innerHTML = 
            `我们在一起：${Math.floor(diff/864e5)}天 ${new Date(diff).toISOString().substr(11, 8).replace(/:/g, '时', '分')}秒了`;
        }

        // 音乐控制
        const audio = document.getElementById('bgMusic');
        function toggleMusic() {
            audio.paused ? audio.play() : audio.pause();
            audio.muted = false;
        }

        // 初始化
        createStars();
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
